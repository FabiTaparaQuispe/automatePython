name: MLOps CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Run Linter (flake8)
      run: flake8 src/

    - name: Run Tests (pytest)
      run: pytest tests/

    - name: Verify Data with DVC
      run: |
        dvc pull || echo "DVC remote not configured, skipping data pull"

    - name: Generate Report
      run: |
        echo "## MLOps CI Pipeline Report" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Linting (flake8) | Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests (pytest) | Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Data Lineage (dvc pull) | Verified |" >> $GITHUB_STEP_SUMMARY
